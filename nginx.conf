server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tlecuyer.codes;

    ssl_certificate /etc/letsencrypt/live/tlecuyer.codes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tlecuyer.codes/privkey.pem;

    # API
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
