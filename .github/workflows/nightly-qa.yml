name: Nightly QA Build

on:
    schedule:
        - cron: "0 8 * * *"
    workflow_dispatch:

env:
    ECR_REPOSITORY: ecommerce-app
    AWS_REGION: us-east-1

jobs:
    qa-build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout infra repo
              uses: actions/checkout@v4
              with:
                  path: infra

            - name: Checkout source repo
              uses: actions/checkout@v4
              with:
                  repository: theolecuyer/E-Commerce-react-node-mysql
                  path: app

            - name: Copy nginx.conf into build
              run: cp infra/nginx.conf app/nginx.conf

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build test image
              run: docker build --build-arg REACT_APP_API_URL=https://tlecuyer.codes/ -t ecommerce-app:test ./app

            - name: Push :test tag to ECR
              run: |
                  docker tag ecommerce-app:test ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:test
                  docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:test

            - name: Install Python script dependencies
              run: pip install boto3 requests paramiko

            - name: Run EC2 smoke test
              run: python infra/scripts/smoke_test.py
              env:
                  QA_SECURITY_GROUP_ID: ${{ secrets.QA_SECURITY_GROUP_ID }}
                  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
                  DB_SERVER_HOST: ${{ secrets.DB_SERVER_HOST }}
                  DB_SERVER_USER: ${{ secrets.DB_SERVER_USER }}
                  DB_SERVER_PASSWORD: ${{ secrets.DB_SERVER_PASSWORD }}
                  DB_SERVER_DATABASE: ${{ secrets.DB_SERVER_DATABASE }}
                  JWT_SECRET_KEY_ACCESS_TOKEN: ${{ secrets.JWT_SECRET_KEY_ACCESS_TOKEN }}
                  JWT_SECRET_KEY_REFRESH_TOKEN: ${{ secrets.JWT_SECRET_KEY_REFRESH_TOKEN }}
                  SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
                  SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}

            - name: Promote :test to :latest in ECR
              run: |
                  docker tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:test \
                    ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
                  docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

            - name: Deploy to QA EC2
              uses: appleboy/ssh-action@v1
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
                  ECR_PASSWORD: ${{ steps.login-ecr.outputs.docker-password }}
                  DB_SERVER_HOST: ${{ secrets.DB_SERVER_HOST }}
                  DB_SERVER_USER: ${{ secrets.DB_SERVER_USER }}
                  DB_SERVER_PASSWORD: ${{ secrets.DB_SERVER_PASSWORD }}
                  DB_SERVER_DATABASE: ${{ secrets.DB_SERVER_DATABASE }}
                  JWT_SECRET_KEY_ACCESS_TOKEN: ${{ secrets.JWT_SECRET_KEY_ACCESS_TOKEN }}
                  JWT_SECRET_KEY_REFRESH_TOKEN: ${{ secrets.JWT_SECRET_KEY_REFRESH_TOKEN }}
              with:
                  host: ${{ secrets.QA_EC2_IP }}
                  username: ec2-user
                  key: ${{ secrets.EC2_SSH_KEY }}
                  envs: ECR_REGISTRY,ECR_REPOSITORY,ECR_PASSWORD,DB_SERVER_HOST,DB_SERVER_USER,DB_SERVER_PASSWORD,DB_SERVER_DATABASE,JWT_SECRET_KEY_ACCESS_TOKEN,JWT_SECRET_KEY_REFRESH_TOKEN
                  script: |
                      docker login --username AWS --password "$ECR_PASSWORD" $ECR_REGISTRY
                      docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest
                      docker rm -f $(docker ps -aq)
                      docker run -d --name ecommerce -p 3001:3001 \
                        -e DB_SERVER_HOST="$DB_SERVER_HOST" \
                        -e DB_SERVER_USER="$DB_SERVER_USER" \
                        -e DB_SERVER_PASSWORD="$DB_SERVER_PASSWORD" \
                        -e DB_SERVER_DATABASE="$DB_SERVER_DATABASE" \
                        -e JWT_SECRET_KEY_ACCESS_TOKEN="$JWT_SECRET_KEY_ACCESS_TOKEN" \
                        -e JWT_SECRET_KEY_REFRESH_TOKEN="$JWT_SECRET_KEY_REFRESH_TOKEN" \
                        $ECR_REGISTRY/$ECR_REPOSITORY:latest
